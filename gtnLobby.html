<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="gtn.css">
    <script type="module" src="./gtnLobby.mjs"></script>
    <script type="module" src="./main.mjs"></script>
    <title>Guess the Number Lobby</title>
</head>

<body onload="fb_initialise(), userAuthState(), listenerFunctions()">
    <h1>Guess the Number Lobby</h1>

    <h3 id="joinCode">You have successfully made a game lobby. Your code is: </h3>

    <button onclick="createLobby()">Create Game Room</button>
    <h2 id="lobbyList">Current games:</h2>
    
    <div class=lobbyDisplays>
        <div class="lobbiesUsernames">
            <p id="lobbyDisplay"></p>
        </div>
        <div class="lobbiesButtons">
            <p id="lobbyButtons"></p>
        </div>
    </div>
</body>

</html>
