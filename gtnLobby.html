<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="gtn.css">
    <script type="module" src="./gtnLobby.mjs"></script>
    <script type="module" src="./main.mjs"></script>
    <title>Guess the Number Lobby</title>
</head>

<body onload="fb_initialise(), userAuthState()">
    <h1>Guess the Number Lobby</h1>

    <h3 id="joinCode">You have successfully made a game lobby. Your code is: </h3>

    <button onclick="createLobby()">Create Game Room</button>

    <h2>If you would like to enter someone's game room, please enter their code</h2>
    <label for="gameRoomCode">Code:</label><br><br>
    <input type="text" id="gameRoomCode" name="gameRoomCode">
    <input type="submit" onclick='getGameRoomCode()'>
</body>

</html>
