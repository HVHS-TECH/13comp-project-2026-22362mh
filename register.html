<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./main.mjs"></script>
</head>

<body>
    <h1>Please register your account!</h1>

    <button onclick='fb_initialise(), fb_login()'>Choose an email</button><br>

    <label for="username">Username: </label><br>
    <input type="text" id="username" name="username"><br>
    <label for="userAge">Age: </label><br>
    <input type="number" id="userAge" name="userAge"><br>
    <input type="submit" onclick='fb_getSignUpDetails()'>

</body>

</html>
